name: Playwright Tests CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      BASE_API: http://localhost:3333
      BASE_URL: http://localhost:3000
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_DATABASE: ${{ secrets.DB_DATABASE }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_PORT: 5432
      TOKEN: ${{ secrets.TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies for API
        run: npm install
        working-directory: apps/zombieplus/api

      - name: Install Dependencies for Web
        run: npm install
        working-directory: apps/zombieplus/web

      - name: Install Dependencies for Playwright
        run: npm install
        working-directory: projects/zombieplus

      - name: Start API
        run: npm run dev &
        working-directory: apps/zombieplus/api

      - name: Start Web
        run: npm run dev &
        working-directory: apps/zombieplus/web

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: projects/zombieplus

      - name: Wait for servers to be ready
        run: npx wait-on http://localhost:3333 http://localhost:3000
        timeout-minutes: 5

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: projects/zombieplus

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: projects/zombieplus/playwright-report/
          retention-days: 7
